<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="theme-color" content="#3a7c5e">
    <title>Explorador J4+ · iOS 9 · Câmera Corrigida</title>
    
    <link href="https://fonts.googleapis.com/css?family=Patrick+Hand|Quicksand:400,500,600,700" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Desativar todas as animações para performance */
        *, *::before, *::after {
            -webkit-transition: none !important;
            transition: none !important;
            -webkit-animation: none !important;
            animation: none !important;
        }
        
        :root {
            --verde: #3a7c5e;
            --amarelo: #f4c542;
            --terra: #a67c52;
            --fundo: #fff8e7;
            --ia: #7c4dff;
            --rede: #4a90e2;
            --backup: #2196f3;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: #e8e0c8;
            color: #2d3e2b;
            font-size: 14px;
        }
        
        #app {
            max-width: 550px;
            margin: 0 auto;
            background: var(--fundo);
            min-height: 100vh;
            position: relative;
        }
        
        .app-header {
            background: var(--verde);
            padding: 10px 16px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-top {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-pack: justify;
            -ms-flex-pack: justify;
            justify-content: space-between;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .app-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 1rem;
        }
        
        .badge {
            padding: 3px 8px;
            border-radius: 60px;
            font-size: 0.6rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .badge-ia { background: var(--ia); }
        .badge-rede { background: var(--rede); }
        .badge-backup { background: var(--backup); }
        .badge-eco { background: #4caf50; }
        
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 550px;
            margin: 0 auto;
            background: var(--verde);
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-pack: distribute;
            justify-content: space-around;
            padding: 8px 6px;
            z-index: 100;
        }
        
        .menu-item {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            -ms-flex-direction: column;
            flex-direction: column;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 25px;
        }
        
        .menu-item.active {
            color: var(--amarelo);
            background: rgba(255,255,255,0.12);
        }
        
        .menu-item span:first-child {
            font-size: 1.3rem;
        }
        
        #content {
            padding: 12px;
            padding-bottom: 70px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid rgba(58,124,94,0.15);
        }
        
        .btn {
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            padding: 12px 20px;
            width: 100%;
            font-size: 0.9rem;
        }
        
        .btn-primary { background: var(--verde); color: white; }
        .btn-secondary { background: var(--amarelo); color: var(--verde); }
        .btn-ia { background: var(--ia); color: white; }
        .btn-rede { background: var(--rede); color: white; }
        .btn-backup { background: var(--backup); color: white; }
        
        .btn:active { opacity: 0.8; }
        
        .camera-container {
            background: #1a1a2e;
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
        }
        
        video {
            width: 100%;
            display: block;
            background: #1a1a2e;
        }
        
        .ia-resultado {
            background: var(--ia);
            color: white;
            padding: 12px;
            border-radius: 16px;
            margin: 10px 0;
            text-align: center;
        }
        
        .confianca-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 6px;
            margin-top: 5px;
        }
        
        .confianca-fill {
            background: var(--amarelo);
            height: 100%;
            width: 0%;
            border-radius: 10px;
        }
        
        .botoes-duplos {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            gap: 8px;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
        }
        
        .botoes-duplos .btn {
            -webkit-box-flex: 1;
            -ms-flex: 1;
            flex: 1;
            min-width: 120px;
        }
        
        .membro-item {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: var(--fundo);
            border-radius: 16px;
            margin: 8px 0;
        }
        
        .codigo-familia {
            font-family: monospace;
            font-size: 1.3rem;
            text-align: center;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 16px;
            letter-spacing: 2px;
        }
        
        .grid-fotos {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -ms-flex-wrap: wrap;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .foto-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--verde);
            cursor: pointer;
            width: calc(50% - 4px);
        }
        
        .foto-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .upload-area {
            border: 2px dashed var(--verde);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            -webkit-box-pack: center;
            -ms-flex-pack: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 18px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .campo {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin: 6px 0;
            font-family: 'Quicksand', sans-serif;
        }
        
        .progresso-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin: 8px 0;
        }
        
        .progresso-fill {
            background: var(--verde);
            height: 100%;
            width: 0%;
            border-radius: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: var(--verde);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            text-align: center;
            z-index: 1000;
            font-size: 0.8rem;
        }
        
        .loading {
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-pack: center;
            -ms-flex-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            height: 150px;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid var(--verde);
            border-top-color: var(--amarelo);
            border-radius: 50%;
            -webkit-animation: spin 0.8s linear infinite;
            animation: spin 0.8s linear infinite;
        }
        
        @-webkit-keyframes spin {
            to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
        }
        @keyframes spin {
            to { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
        }
        
        /* Flash da câmera */
        .flash-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0.8;
            z-index: 9999;
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            .foto-card {
                width: calc(50% - 4px);
            }
            .botoes-duplos {
                -webkit-box-orient: vertical;
                -webkit-box-direction: normal;
                -ms-flex-direction: column;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-top">
                <div class="app-title">🔬 Explorador J4+ · Câmera OK</div>
                <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                    <span class="badge badge-ia" id="iaStatus">🧠 IA</span>
                    <span class="badge badge-rede" id="redeStatus">📡 Rede</span>
                    <span class="badge badge-backup" id="backupStatus">💾 Backup</span>
                    <span class="badge badge-eco" id="ecoStatus">⚡ Eco</span>
                </div>
            </div>
        </header>

        <div id="content"><div class="loading"></div></div>

        <nav class="bottom-menu">
            <div class="menu-item active" onclick="navegarPara('ia')">
                <span>🤖</span>
                <span>IA</span>
            </div>
            <div class="menu-item" onclick="navegarPara('album')">
                <span>📸</span>
                <span>Fotos</span>
            </div>
            <div class="menu-item" onclick="navegarPara('rede')">
                <span>👨‍👩‍👧</span>
                <span>Rede</span>
            </div>
            <div class="menu-item" onclick="navegarPara('perfil')">
                <span>👤</span>
                <span>Perfil</span>
            </div>
        </nav>
    </div>

    <script>
        // ==================== CONFIGURAÇÕES COMPATÍVEIS COM iOS 9 ====================
        var CONFIG = {
            imageQuality: 0.4,
            maxPhotos: 50,
            iaDelay: 4000,
            iaEnabled: true,
            versao: "2.1-camera-fixed"
        };
        
        // Detectar memória
        if (navigator.deviceMemory && navigator.deviceMemory < 2) {
            CONFIG.iaEnabled = false;
            document.getElementById('iaStatus').innerHTML = '⚠️ IA';
        }
        
        // ==================== ESTADO ====================
        var explorador = {
            id: 'exp_' + Date.now(),
            nome: localStorage.getItem('nome') || 'Explorador',
            avatar: '🐞',
            nivel: parseInt(localStorage.getItem('nivel')) || 1,
            xp: parseInt(localStorage.getItem('xp')) || 0,
            descobertas: []
        };
        
        var NIVEIS = {
            1: { nome: "Aprendiz", icone: "🌱", minXP: 0 },
            2: { nome: "Observador", icone: "🔍", minXP: 80 },
            3: { nome: "Explorador", icone: "🌿", minXP: 200 },
            4: { nome: "Naturalista", icone: "🦋", minXP: 400 },
            5: { nome: "Mestre", icone: "🏆", minXP: 700 }
        };
        
        function salvarDados() {
            try {
                if (explorador.descobertas.length > CONFIG.maxPhotos) {
                    explorador.descobertas = explorador.descobertas.slice(0, CONFIG.maxPhotos);
                }
                localStorage.setItem('nome', explorador.nome);
                localStorage.setItem('nivel', explorador.nivel);
                localStorage.setItem('xp', explorador.xp);
                localStorage.setItem('descobertas', JSON.stringify(explorador.descobertas));
                document.getElementById('backupStatus').innerHTML = '💾 OK';
            } catch(e) {
                console.log('Erro ao salvar');
            }
        }
        
        function carregarDados() {
            var saved = localStorage.getItem('descobertas');
            if (saved) {
                try {
                    explorador.descobertas = JSON.parse(saved);
                } catch(e) {}
            }
        }
        
        function atualizarNivel() {
            var novoNivel = explorador.nivel;
            var i;
            for (i = 5; i >= 1; i--) {
                if (explorador.xp >= NIVEIS[i].minXP && i > novoNivel) {
                    novoNivel = i;
                    mostrarToast('✨ Agora você é ' + NIVEIS[i].nome + '!');
                }
            }
            if (novoNivel !== explorador.nivel) {
                explorador.nivel = novoNivel;
                salvarDados();
            }
        }
        
        function adicionarXP(valor) {
            explorador.xp += valor;
            salvarDados();
            atualizarNivel();
            mostrarToast('+' + valor + ' XP!');
        }
        
        function mostrarToast(msg) {
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(function() {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 2500);
        }
        
        // ==================== IA E CÂMERA ====================
        var model = null;
        var modelCarregado = false;
        var videoStream = null;
        var cameraAtiva = false;
        var iaInterval = null;
        var ultimoIA = null;
        var mobileNetScriptLoaded = false;
        
        var INSETOS = {
            'butterfly': { nome: 'Borboleta', emoji: '🦋', dica: 'Adora flores coloridas!' },
            'sulphur butterfly': { nome: 'Borboleta Amarela', emoji: '🦋', dica: 'Comum em jardins' },
            'monarch': { nome: 'Borboleta Monarca', emoji: '🦋', dica: 'Faz migrações longas!' },
            'bee': { nome: 'Abelha', emoji: '🐝', dica: 'Faz mel e poliniza flores' },
            'honeybee': { nome: 'Abelha', emoji: '🐝', dica: 'Vive em colmeias' },
            'wasp': { nome: 'Vespa', emoji: '🐝', dica: 'Cuidado! Pode picar' },
            'ladybug': { nome: 'Joaninha', emoji: '🐞', dica: 'Come pulgões, amiga do jardim' },
            'lady beetle': { nome: 'Joaninha', emoji: '🐞', dica: 'Símbolo de boa sorte!' },
            'ant': { nome: 'Formiga', emoji: '🐜', dica: 'Trabalha em equipe' },
            'beetle': { nome: 'Besouro', emoji: '🪲', dica: 'Tem armadura brilhante' },
            'grasshopper': { nome: 'Gafanhoto', emoji: '🦗', dica: 'Pula bem longe!' },
            'cricket': { nome: 'Grilo', emoji: '🦗', dica: 'Canta à noite' },
            'dragonfly': { nome: 'Libélula', emoji: '🔹', dica: 'Voa muito rápido' },
            'spider': { nome: 'Aranha', emoji: '🕷️', dica: 'Faz teias incríveis!' },
            'caterpillar': { nome: 'Lagarta', emoji: '🐛', dica: 'Vira borboleta depois' },
            'fly': { nome: 'Mosca', emoji: '🪰', dica: 'Tem olhos compostos' },
            'mosquito': { nome: 'Mosquito', emoji: '🦟', dica: 'Cuidado com a picada' },
            'praying mantis': { nome: 'Louva-a-deus', emoji: '🦗', dica: 'Fica paradinho' }
        };
        
        function identificarInseto(texto) {
            texto = texto.toLowerCase();
            var key;
            for (key in INSETOS) {
                if (texto.indexOf(key) !== -1) return INSETOS[key];
            }
            return null;
        }
        
        function carregarIA() {
            if (!CONFIG.iaEnabled) return;
            if (modelCarregado) return;
            if (mobileNetScriptLoaded) return;
            
            mostrarToast('🧠 Carregando IA...');
            
            var tfScript = document.createElement('script');
            tfScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js';
            tfScript.onload = function() {
                var mnScript = document.createElement('script');
                mnScript.src = 'https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js';
                mnScript.onload = function() {
                    if (window.mobilenet) {
                        window.mobilenet.load({ version: 2, alpha: 0.5 }).then(function(m) {
                            model = m;
                            modelCarregado = true;
                            document.getElementById('iaStatus').innerHTML = '🧠 IA ✓';
                            mostrarToast('✅ IA carregada!');
                            if (cameraAtiva) iniciarIdentificacao();
                        }).catch(function(e) {
                            document.getElementById('iaStatus').innerHTML = '⚠️ IA';
                        });
                    }
                };
                document.head.appendChild(mnScript);
            };
            document.head.appendChild(tfScript);
            mobileNetScriptLoaded = true;
        }
        
        function iniciarCamera() {
            if (cameraAtiva) return;
            var video = document.getElementById('cameraVideo');
            if (!video) return;
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(function(stream) {
                    videoStream = stream;
                    video.srcObject = stream;
                    video.play();
                    cameraAtiva = true;
                    if (modelCarregado) iniciarIdentificacao();
                    else if (CONFIG.iaEnabled) carregarIA();
                })
                .catch(function(e) {
                    mostrarToast('📷 Erro na câmera. Verifique permissões.');
                });
        }
        
        function pararCamera() {
            if (videoStream) {
                if (videoStream.getTracks) {
                    videoStream.getTracks().forEach(function(t) { t.stop(); });
                }
                videoStream = null;
            }
            if (iaInterval) clearInterval(iaInterval);
            cameraAtiva = false;
        }
        
        function iniciarIdentificacao() {
            if (iaInterval) clearInterval(iaInterval);
            iaInterval = setInterval(function() {
                var video = document.getElementById('cameraVideo');
                var resultadoDiv = document.getElementById('iaResultado');
                if (video && video.readyState >= 2 && resultadoDiv && modelCarregado && model) {
                    model.classify(video).then(function(pred) {
                        if (pred && pred[0]) {
                            var inseto = identificarInseto(pred[0].className);
                            if (inseto && pred[0].probability > 0.3) {
                                resultadoDiv.innerHTML = '<div class="ia-resultado">' +
                                    '<div style="font-size:1.8rem;">' + inseto.emoji + '</div>' +
                                    '<strong>' + inseto.nome + '</strong>' +
                                    '<div class="confianca-bar"><div class="confianca-fill" style="width: ' + Math.round(pred[0].probability * 100) + '%;"></div></div>' +
                                    '<p style="font-size:0.75rem;">' + inseto.dica + '</p>' +
                                    '<button class="btn btn-primary" style="margin-top:8px; padding:8px;" onclick="capturarFotoAtual()">📸 Registrar agora</button>' +
                                    '</div>';
                                ultimoIA = inseto;
                            }
                        }
                    }).catch(function(e) {});
                }
            }, CONFIG.iaDelay);
        }
        
        // ========== FUNÇÃO PRINCIPAL: TIRAR FOTO DO FRAME ATUAL ==========
        function capturarFotoAtual() {
            var video = document.getElementById('cameraVideo');
            if (!video) {
                mostrarToast('📷 Câmera não está ativa');
                return;
            }
            
            if (video.readyState < 2) {
                mostrarToast('⏳ Aguarde a câmera estabilizar');
                return;
            }
            
            // Criar canvas e capturar o frame atual
            var canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            var fotoBase64 = canvas.toDataURL('image/jpeg', CONFIG.imageQuality);
            
            // Efeito de flash
            var flash = document.createElement('div');
            flash.className = 'flash-effect';
            document.body.appendChild(flash);
            setTimeout(function() {
                flash.remove();
            }, 100);
            
            mostrarToast('📸 Foto capturada! Analisando...');
            
            // Processar a foto com IA
            processarFotoComIA(fotoBase64);
        }
        
        // ========== ANALISAR FOTO JÁ CAPTURADA ==========
        function processarFotoComIA(fotoBase64) {
            var img = new Image();
            img.onload = function() {
                if (modelCarregado && CONFIG.iaEnabled) {
                    model.classify(img).then(function(pred) {
                        var nomeSugerido = '';
                        var dicaSugerida = '';
                        if (pred && pred[0]) {
                            var inseto = identificarInseto(pred[0].className);
                            if (inseto) {
                                nomeSugerido = inseto.nome;
                                dicaSugerida = inseto.dica;
                                mostrarToast('🤖 IA identificou: ' + inseto.nome);
                            } else {
                                nomeSugerido = pred[0].className.split(',')[0].substring(0, 30);
                                mostrarToast('🔍 IA sugere: ' + nomeSugerido);
                            }
                        }
                        abrirFormulario(fotoBase64, nomeSugerido, dicaSugerida);
                    }).catch(function() {
                        abrirFormulario(fotoBase64, '', '');
                    });
                } else {
                    abrirFormulario(fotoBase64, '', '');
                }
            };
            img.src = fotoBase64;
        }
        
        // ========== ESCOLHER FOTO DA GALERIA ==========
        function uploadFotoComIA() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                
                mostrarToast('🔍 Analisando foto da galeria...');
                var reader = new FileReader();
                reader.onload = function(ev) {
                    processarFotoComIA(ev.target.result);
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        function abrirFormulario(foto, nomeSugerido, dicaSugerida) {
            var modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = 
                '<div class="modal-content">' +
                '<h3 style="color:var(--verde);">✨ Nova Descoberta!</h3>' +
                '<img src="' + foto + '" style="width:100%; border-radius:16px; margin:10px 0;">' +
                '<label><strong>🐞 Nome do inseto</strong></label>' +
                '<input type="text" id="nomeInseto" class="campo" placeholder="Ex: Borboleta Monarca" value="' + escapeHtml(nomeSugerido) + '">' +
                '<label><strong>📍 Onde você encontrou?</strong></label>' +
                '<input type="text" id="localInseto" class="campo" placeholder="Ex: Jardim, Parque, Quintal">' +
                '<label><strong>📝 O que observou?</strong></label>' +
                '<textarea id="obsInseto" class="campo" placeholder="Cor, tamanho, comportamento..." rows="3">' + (dicaSugerida ? '💡 Dica da IA: ' + escapeHtml(dicaSugerida) + '\n\n' : '') + '</textarea>' +
                '<div style="display:flex; gap:8px; margin-top:15px;">' +
                '<button class="btn btn-secondary" style="flex:1;" onclick="this.closest(\'.modal\').remove()">Cancelar</button>' +
                '<button class="btn btn-primary" style="flex:2;" onclick="salvarDescobertaCompleta(this.closest(\'.modal\'), \'' + foto + '\')">💾 Salvar</button>' +
                '</div>' +
                '</div>';
            document.body.appendChild(modal);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function salvarDescobertaCompleta(modal, fotoBase64) {
            var nomeInput = document.getElementById('nomeInseto');
            var localInput = document.getElementById('localInseto');
            var obsTextarea = document.getElementById('obsInseto');
            var nome = nomeInput ? nomeInput.value : '';
            var local = localInput ? localInput.value : '';
            var obs = obsTextarea ? obsTextarea.value : '';
            
            if (!nome || nome.trim() === '') {
                mostrarToast('🐞 Digite o nome do inseto!');
                return;
            }
            
            var novaDescoberta = {
                id: Date.now(),
                nome: nome.substring(0, 35),
                local: local || 'Não informado',
                obs: obs || 'Sem observações',
                data: new Date().toLocaleDateString('pt-BR'),
                dataCompleta: new Date().toISOString(),
                foto: fotoBase64
            };
            
            explorador.descobertas.unshift(novaDescoberta);
            salvarDados();
            adicionarXP(15);
            if (modal) modal.remove();
            mostrarToast('✨ "' + novaDescoberta.nome + '" salvo! +15 XP');
            if (currentPage === 'album') renderAlbum();
        }
        
        function verDescoberta(id) {
            var d = null;
            for (var i = 0; i < explorador.descobertas.length; i++) {
                if (explorador.descobertas[i].id === id) {
                    d = explorador.descobertas[i];
                    break;
                }
            }
            if (!d) return;
            var modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = 
                '<div class="modal-content">' +
                '<img src="' + d.foto + '" style="width:100%; border-radius:16px;">' +
                '<h3 style="margin:10px 0;">🐞 ' + escapeHtml(d.nome) + '</h3>' +
                '<p>📍 ' + escapeHtml(d.local) + '</p>' +
                '<p>📅 ' + escapeHtml(d.data) + '</p>' +
                '<div style="background:#f5f0e0; padding:12px; border-radius:12px; margin:10px 0;">' + escapeHtml(d.obs || 'Sem observações') + '</div>' +
                '<button class="btn btn-primary" onclick="compartilharDescoberta(' + d.id + ')" style="margin-bottom:8px;">📤 Compartilhar</button>' +
                '<button class="btn btn-secondary" onclick="this.closest(\'.modal\').remove()">Fechar</button>' +
                '</div>';
            document.body.appendChild(modal);
        }
        
        // ==================== BACKUP ====================
        function exportarBackup() {
            var dados = {
                versao: CONFIG.versao,
                dataBackup: new Date().toISOString(),
                explorador: {
                    nome: explorador.nome,
                    nivel: explorador.nivel,
                    xp: explorador.xp,
                    descobertas: explorador.descobertas
                },
                config: { familiaId: familiaId }
            };
            var dadosStr = JSON.stringify(dados, null, 2);
            var blob = new Blob([dadosStr], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'backup_explorador_' + explorador.nome + '_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            mostrarToast('📦 Backup salvo! ' + explorador.descobertas.length + ' descobertas');
        }
        
        function importarBackup() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        var dados = JSON.parse(ev.target.result);
                        if (dados.explorador) {
                            explorador.nome = dados.explorador.nome;
                            explorador.nivel = dados.explorador.nivel;
                            explorador.xp = dados.explorador.xp;
                            explorador.descobertas = dados.explorador.descobertas || [];
                            if (dados.config && dados.config.familiaId) {
                                familiaId = dados.config.familiaId;
                                localStorage.setItem('familiaId', familiaId);
                            }
                            salvarDados();
                            mostrarToast('✅ Backup restaurado! ' + explorador.descobertas.length + ' descobertas');
                            if (currentPage === 'album') renderAlbum();
                            if (currentPage === 'perfil') renderPerfil();
                        } else {
                            mostrarToast('❌ Arquivo inválido');
                        }
                    } catch(err) {
                        mostrarToast('❌ Erro ao ler backup');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function compartilharDescoberta(id) {
            var d = null;
            for (var i = 0; i < explorador.descobertas.length; i++) {
                if (explorador.descobertas[i].id === id) {
                    d = explorador.descobertas[i];
                    break;
                }
            }
            if (!d) return;
            var mensagem = '🔬 *Descoberta do Explorador ' + explorador.nome + '* 🔬\n\n' +
                           '🐞 *Inseto:* ' + d.nome + '\n' +
                           '📍 *Local:* ' + d.local + '\n' +
                           '📅 *Data:* ' + d.data + '\n' +
                           '📝 *Observação:* ' + d.obs + '\n\n' +
                           '🌟 Nível ' + explorador.nivel + ' | ' + explorador.xp + ' XP';
            if (navigator.share) {
                navigator.share({ title: 'Descoberta: ' + d.nome, text: mensagem }).catch(function() {
                    copiarTexto(mensagem);
                });
            } else {
                copiarTexto(mensagem);
            }
        }
        
        function copiarTexto(texto) {
            var textarea = document.createElement('textarea');
            textarea.value = texto;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                mostrarToast('📋 Descrição copiada!');
            } catch(e) {
                mostrarToast('Não foi possível copiar');
            }
            document.body.removeChild(textarea);
        }
        
        function verificarEspaco() {
            var dados = localStorage.getItem('descobertas');
            var tamanho = dados ? (dados.length / 1024).toFixed(2) : 0;
            var totalFotos = explorador.descobertas.length;
            mostrarToast('📊 ' + totalFotos + ' fotos | ~' + tamanho + ' KB de espaço');
        }
        
        function limparFotosAntigas(manterUltimas) {
            if (explorador.descobertas.length > manterUltimas) {
                var removidas = explorador.descobertas.length - manterUltimas;
                explorador.descobertas = explorador.descobertas.slice(0, manterUltimas);
                salvarDados();
                mostrarToast('🗑️ ' + removidas + ' fotos antigas removidas');
                if (currentPage === 'album') renderAlbum();
            } else {
                mostrarToast('✅ Você tem ' + explorador.descobertas.length + ' fotos');
            }
        }
        
        function resetarDados() {
            if (confirm('⚠️ ATENÇÃO! Todas as suas fotos e progresso serão apagados permanentemente!\n\nFaça um backup antes se quiser manter os dados.\n\nTem certeza?')) {
                explorador.descobertas = [];
                explorador.xp = 0;
                explorador.nivel = 1;
                salvarDados();
                mostrarToast('🗑️ Todos os dados foram resetados!');
                if (currentPage === 'album') renderAlbum();
                if (currentPage === 'perfil') renderPerfil();
            }
        }
        
        function editarNome() {
            var novo = prompt('Seu nome de explorador:', explorador.nome);
            if (novo && novo.trim()) {
                explorador.nome = novo.substring(0, 20);
                salvarDados();
                renderPerfil();
                mostrarToast('✨ Nome alterado para ' + explorador.nome);
            }
        }
        
        // ==================== REDE FAMILIAR ====================
        var familiaId = localStorage.getItem('familiaId');
        if (!familiaId) {
            familiaId = 'FAM_' + Math.random().toString(36).substring(2, 8).toUpperCase();
            localStorage.setItem('familiaId', familiaId);
        }
        var channel = null;
        var membrosRede = {};
        
        function iniciarRede() {
            if (window.BroadcastChannel) {
                try {
                    channel = new BroadcastChannel('explorador_' + familiaId);
                    channel.onmessage = function(event) {
                        if (event.data && event.data.tipo === 'membro') {
                            membrosRede[event.data.id] = event.data;
                            if (currentPage === 'rede') renderRede();
                        }
                    };
                    setInterval(function() {
                        if (channel) {
                            channel.postMessage({ tipo: 'membro', id: explorador.id, nome: explorador.nome });
                        }
                    }, 30000);
                    document.getElementById('redeStatus').innerHTML = '📡 Conectado';
                } catch(e) {
                    document.getElementById('redeStatus').innerHTML = '📡 Offline';
                }
            } else {
                document.getElementById('redeStatus').innerHTML = '📡 Local';
            }
        }
        
        // ==================== RENDERIZAÇÃO ====================
        var currentPage = 'ia';
        
        function navegarPara(page) {
            currentPage = page;
            if (page !== 'ia') pararCamera();
            
            var itens = document.querySelectorAll('.menu-item');
            for (var i = 0; i < itens.length; i++) {
                itens[i].classList.remove('active');
            }
            if (page === 'ia') itens[0].classList.add('active');
            else if (page === 'album') itens[1].classList.add('active');
            else if (page === 'rede') itens[2].classList.add('active');
            else if (page === 'perfil') itens[3].classList.add('active');
            
            var content = document.getElementById('content');
            content.innerHTML = '<div class="loading"></div>';
            setTimeout(function() {
                if (page === 'ia') renderIA();
                else if (page === 'album') renderAlbum();
                else if (page === 'rede') renderRede();
                else if (page === 'perfil') renderPerfil();
            }, 30);
        }
        
        function renderIA() {
            var content = document.getElementById('content');
            content.innerHTML = 
                '<div class="camera-container">' +
                '<video id="cameraVideo" autoplay playsinline style="width:100%;"></video>' +
                '</div>' +
                '<div id="iaResultado"></div>' +
                '<div class="card botoes-duplos">' +
                '<button class="btn btn-primary" onclick="capturarFotoAtual()">📸 Tirar Foto AGORA</button>' +
                '<button class="btn btn-secondary" onclick="uploadFotoComIA()">📷 Escolher da galeria</button>' +
                '</div>' +
                '<div class="card">' +
                '<div style="display:flex; justify-content:space-between;">' +
                '<span>🎯 Nível ' + explorador.nivel + '</span>' +
                '<span>⭐ ' + explorador.xp + ' XP</span>' +
                '</div>' +
                '<div class="progresso-bar"><div class="progresso-fill" style="width: ' + Math.min(100, (explorador.xp / 700) * 100) + '%;"></div></div>' +
                '</div>';
            setTimeout(function() {
                if (!modelCarregado && CONFIG.iaEnabled) carregarIA();
                iniciarCamera();
            }, 200);
        }
        
        function renderAlbum() {
            var content = document.getElementById('content');
            var fotosHtml = '';
            for (var i = 0; i < explorador.descobertas.length && i < 20; i++) {
                var d = explorador.descobertas[i];
                fotosHtml += '<div class="foto-card" onclick="verDescoberta(' + d.id + ')">' +
                    '<img src="' + d.foto + '" class="foto-img" loading="lazy">' +
                    '<div style="padding:6px;"><strong style="font-size:0.7rem;">🐞 ' + escapeHtml(d.nome.substring(0,15)) + '</strong></div>' +
                    '</div>';
            }
            if (fotosHtml === '') {
                fotosHtml = '<div class="card" style="grid-column:span 2; text-align:center;">🐛 Nenhuma descoberta ainda.<br>Use a câmera para começar!</div>';
            }
            content.innerHTML = 
                '<div class="upload-area" onclick="uploadFotoComIA()">' +
                '<div style="font-size:1.8rem;">➕📸</div>' +
                '<p>Adicionar foto da galeria</p>' +
                '</div>' +
                '<div class="grid-fotos">' + fotosHtml + '</div>';
        }
        
        function renderRede() {
            var membrosHtml = '<div class="membro-item" style="background:var(--amarelo);">' +
                '<div style="font-size:1.5rem;">' + explorador.avatar + '</div>' +
                '<div><strong>' + escapeHtml(explorador.nome) + '</strong><br>(você)</div>' +
                '</div>';
            for (var id in membrosRede) {
                if (membrosRede.hasOwnProperty(id) && id !== explorador.id) {
                    var m = membrosRede[id];
                    membrosHtml += '<div class="membro-item">' +
                        '<div style="font-size:1.5rem;">🐞</div>' +
                        '<div><strong>' + escapeHtml(m.nome) + '</strong><br>🟢 Online</div>' +
                        '</div>';
                }
            }
            var content = document.getElementById('content');
            content.innerHTML = 
                '<div class="card">' +
                '<div style="text-align:center;">' +
                '<p><strong>🔑 Código da Família</strong></p>' +
                '<div class="codigo-familia">' + escapeHtml(familiaId) + '</div>' +
                '<button class="btn btn-secondary" style="margin-top:8px;" onclick="copiarTexto(\'' + familiaId + '\'); mostrarToast(\'Código copiado!\')">📋 Copiar</button>' +
                '</div>' +
                '</div>' +
                '<div class="card">' +
                '<h3>👥 Membros Online</h3>' +
                '<div id="listaMembros">' + membrosHtml + '</div>' +
                '</div>' +
                '<div class="card">' +
                '<p><strong>📡 Como conectar:</strong><br>1. Mesmo Wi-Fi<br>2. Mesmo código<br>3. Descobertas compartilhadas</p>' +
                '</div>';
        }
        
        function renderPerfil() {
            var content = document.getElementById('content');
            content.innerHTML = 
                '<div class="card" style="text-align:center;">' +
                '<div style="font-size:2.5rem;">' + explorador.avatar + '</div>' +
                '<h3>' + escapeHtml(explorador.nome) + '</h3>' +
                '<p>' + (NIVEIS[explorador.nivel] ? NIVEIS[explorador.nivel].nome : 'Aprendiz') + '</p>' +
                '<button class="btn btn-secondary" style="margin-top:8px;" onclick="editarNome()">✏️ Editar nome</button>' +
                '</div>' +
                '<div class="card">' +
                '<h3>📊 Estatísticas</h3>' +
                '<p>📸 Descobertas: ' + explorador.descobertas.length + '</p>' +
                '<p>⭐ Nível: ' + explorador.nivel + '</p>' +
                '<p>🏆 XP: ' + explorador.xp + '</p>' +
                '</div>' +
                '<div class="card">' +
                '<h3>💾 Backup e Segurança</h3>' +
                '<button class="btn btn-backup" onclick="exportarBackup()" style="margin:5px 0;">📦 Exportar todas as descobertas</button>' +
                '<button class="btn btn-secondary" onclick="importarBackup()" style="margin:5px 0;">📂 Restaurar de backup</button>' +
                '<button class="btn btn-secondary" onclick="verificarEspaco()" style="margin:5px 0;">📊 Verificar espaço</button>' +
                '<button class="btn btn-secondary" onclick="limparFotosAntigas(50)" style="margin:5px 0; background:#ff9800; color:white;">🗑️ Limpar fotos antigas</button>' +
                '</div>' +
                '<div class="card">' +
                '<h3>📱 Sobre o App</h3>' +
                '<p>Versão ' + CONFIG.versao + ' - Otimizado para iPad antigo</p>' +
                '<p>📸 <strong>Como usar a câmera:</strong> Clique em "Tirar Foto AGORA" para capturar o que está na tela!</p>' +
                '<p>IA: ' + (CONFIG.iaEnabled && modelCarregado ? '✅ Ativa' : (CONFIG.iaEnabled ? '⏳ Carregando' : '⚠️ Desativada (economia)')) + '</p>' +
                '<button class="btn btn-secondary" onclick="resetarDados()" style="background:#d32f2f; color:white; margin-top:8px;">🗑️ Resetar todos os dados</button>' +
                '</div>';
        }
        
        // ==================== INICIALIZAÇÃO ====================
        carregarDados();
        atualizarNivel();
        iniciarRede();
        
        // Registrar funções globais
        window.navegarPara = navegarPara;
        window.capturarFotoAtual = capturarFotoAtual;
        window.uploadFotoComIA = uploadFotoComIA;
        window.processarFotoComIA = processarFotoComIA;
        window.salvarDescobertaCompleta = salvarDescobertaCompleta;
        window.verDescoberta = verDescoberta;
        window.editarNome = editarNome;
        window.resetarDados = resetarDados;
        window.mostrarToast = mostrarToast;
        window.exportarBackup = exportarBackup;
        window.importarBackup = importarBackup;
        window.compartilharDescoberta = compartilharDescoberta;
        window.verificarEspaco = verificarEspaco;
        window.limparFotosAntigas = limparFotosAntigas;
        window.copiarTexto = copiarTexto;
        
        renderIA();
    </script>
</body>
</html>
